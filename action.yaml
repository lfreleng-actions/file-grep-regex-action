---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: 'Extract string from file using GREP'
description: 'Uses grep and a regular expression to extract text from files'

inputs:
  # Mandatory
  regex:
    description: 'Regular expression used to extract string'
    required: true
  filename:
    description: 'File containing text to extract'
    required: true
  # Optional
  flags:
    description: 'Flags to use with grep command'
    required: false
    default: '-E'
  no_fail:
    description: 'Override errors if file not found or no value returned'
    required: false
    default: 'false'

outputs:
  extracted_string:
    description: 'The string extracted by the regular expression'
    value: "${{ steps.grep.outputs.extracted_string }}"

runs:
  using: 'composite'
  steps:
    - name: 'Extract text/string from file'
      id: grep
      shell: bash
      env:
        INPUT_FLAGS: ${{ inputs.flags }}
        INPUT_REGEX: ${{ inputs.regex }}
        INPUT_FILENAME: ${{ inputs.filename }}
        INPUT_NO_FAIL: ${{ inputs.no_fail }}
      run: |
        # Extract text/string from file

        set -o pipefail

        set -o noglob
        flags="$INPUT_FLAGS"
        regex="$INPUT_REGEX"
        filename="$INPUT_FILENAME"
        set +o noglob

        if [ ! -f "$filename" ]; then
          echo "Error: file not found [$filename]"
          if [ "f$INPUT_NO_FAIL" = 'ftrue' ]; then
            exit 0
          else
            exit 1
          fi
        fi

        set -o noglob

        echo "Regular expression to use: $regex"
        echo "File to search: $filename"
        if [ -n "$flags" ]; then
          echo "Flags to grep command: $flags"
        fi
        # Extract the string using grep and regex.
        # Split user flags into an array (safe word-splitting under noglob),
        # dropping any standalone '--' tokens (the script supplies its own
        # below). Pass the pattern via -e and terminate options with -- so a
        # regex or filename beginning with '-' cannot be parsed as an option.
        read -ra raw_flags <<< "$flags"
        grep_flags=()
        for gf in "${raw_flags[@]}"; do
          [ "$gf" = '--' ] && continue
          grep_flags+=("$gf")
        done
        string=$(grep "${grep_flags[@]}" -e "$regex" -- "$filename" || true)
        set +o noglob

        if [ -z "$string" ]; then
          echo 'String extraction failed; no matching value found ❌'
          if [ "f$INPUT_NO_FAIL" = 'ftrue' ]; then
            exit 0
          else
            exit 1
          fi
        else
          # Make multi-line string available as action output
          { echo 'extracted_string<<EOF'
            echo "$string"
            echo EOF
          } >> "$GITHUB_ENV"
          { echo 'extracted_string<<EOF'
            echo "$string"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          echo "Extracted string ✅"
          echo "$string"
        fi
